name: Continous Delivery to SUSE OBS Rolling Project
concurrency: cd-obs-${{ github.ref }}
on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "main"
    paths-ignore:
      - 'VERSION'    
  pull_request:
  workflow_dispatch:

jobs:
  get-rolling-version:
    name: Get rolling version tag
    runs-on: ubuntu-24.04    
    container:
      image: ghcr.io/trento-project/continuous-delivery:main
      options: -u 0:0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Get Rolling Version
        id: get-rolling-version
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE" 
          ROLLING_VERSION=$(/scripts/get_version_from_git.sh) 
          echo "Rolling version detected: $ROLLING_VERSION"
          echo "version=$ROLLING_VERSION" >> "$GITHUB_OUTPUT"

  debug-rolling-version:
    runs-on: ubuntu-24.04    
    name: Debug rolling version
    run: echo ${{ needs.get-rolling-version.outputs.version }}        

  obs-sync:
    name: Update OBS package
    uses: ./.github/workflows/obs.yaml
    needs:
      - get-rolling-version
    secrets: inherit
    with:
      obs_project: ${{ vars.OBS_PROJECT_ROLLING }}
      version_tag: ${{ needs.get-rolling-version.outputs.version }}
      is_release: false